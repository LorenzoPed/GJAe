<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Laundry Login</title> <!-- Tradotto -->
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .login-card {
            width: 400px;
            padding: 20px;
        }
    </style>
</h:head>

<h:body>
    <p:card styleClass="login-card">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>🧺 Laundry Service</h2> <!-- Tradotto -->
            <p>Please sign in to continue</p> <!-- Tradotto -->
        </div>

        <!-- prependId="false" è essenziale per Spring Security! -->
        <h:form id="loginForm" prependId="false">

            <!-- Messaggio di errore se le credenziali sono sbagliate -->
            <p:outputPanel rendered="#{param['error'] != null}" style="margin-bottom:15px">
                <p:staticMessage severity="error" summary="Error" detail="Invalid username or password" style="width: 100%"/> <!-- Tradotto -->
            </p:outputPanel>

            <div class="field" style="margin-bottom: 20px;">
                <span class="ui-float-label">
                    <p:inputText id="username" name="username" required="true" style="width: 100%"/>
                    <p:outputLabel for="@previous" value="Username"/> <!-- Invariato (internazionale) -->
                </span>
            </div>

            <div class="field" style="margin-bottom: 30px;">
                <span class="ui-float-label">
                    <p:password id="password" name="password" required="true" toggleMask="true" style="width: 100%"/>
                    <p:outputLabel for="@previous" value="Password"/> <!-- Invariato (internazionale) -->
                </span>
            </div>

            <p:commandButton value="Sign In" ajax="false" icon="pi pi-sign-in" style="width: 100%;" styleClass="ui-button" />

            <p:button value="Register"
                      outcome="register"
                      icon="pi pi-user-plus"
                      iconPos="left"
                      style="width: 100%; margin-top: 10px;"
                      styleClass="ui-button" />

        </h:form>
    </p:card>
</h:body>
</html>
