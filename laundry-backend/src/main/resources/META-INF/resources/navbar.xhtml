<!DOCTYPE html>
<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:p="http://primefaces.org/ui"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
>
    <h:form id="navForm">
        <p:menubar style="margin-bottom: 20px">

            <p:menuitem
                    value="Dashboard"
                    icon="pi pi-cog"
                    url="/manager-dashboard.xhtml"
                    rendered="#{request.isUserInRole('MANAGER')}"
                    disabled="#{active eq 'dashboard'}"
                    style="#{active eq 'dashboard' ? 'font-weight: bold; opacity: 1 !important; color: #333 !important;' : ''}"
            />

            <p:menuitem
                    value="Calendar"
                    icon="pi pi-calendar"
                    url="/home.xhtml"
                    disabled="#{active eq 'calendar'}"
                    style="#{active eq 'calendar' ? 'font-weight: bold; opacity: 1 !important; color: #333 !important;' : ''}"
            />

            <p:menuitem
                    value="My Bookings"
                    icon="pi pi-list"
                    url="/my-bookings.xhtml"
                    rendered="#{!request.isUserInRole('MANAGER')}"
                    disabled="#{active eq 'mybookings'}"
                    style="#{active eq 'mybookings' ? 'font-weight: bold; opacity: 1 !important; color: #333 !important;' : ''}"
            />

            <f:facet name="options">

             <span style="margin-right: 15px; position: relative; display: inline-block;">
                <p:commandButton id="notifyBtn" icon="pi pi-bell" type="button"
                                 styleClass="rounded-button ui-button-secondary ui-button-flat" />

                <p:badge value="#{notificationView.count}" severity="danger"
                         rendered="#{notificationView.count > 0}"
                         style="position: absolute; top: -5px; right: -5px;" />
             </span>

                <p:button
                        value="Logout"
                        href="/logout"
                        icon="pi pi-power-off"
                        styleClass="ui-button-danger ui-button-flat"
                />
            </f:facet>
        </p:menubar>

        <p:overlayPanel for="notifyBtn" style="width: 350px" showCloseIcon="true">

            <h:outputText value="Nessuna nuova notifica"
                          rendered="#{empty notificationView.unreadNotifications}"
                          style="display:block; padding: 10px; color: #777; text-align: center;" />

            <p:dataScroller id="notifyList"
                            value="#{notificationView.unreadNotifications}" var="n"
                            chunkSize="5" mode="inline"
                            rendered="#{not empty notificationView.unreadNotifications}">

                <div style="border-bottom: 1px solid #eee; padding: 10px;">
                    <div style="display: flex; align-items: start;">
                        <i class="pi pi-info-circle" style="color: orange; margin-right: 10px; margin-top: 3px;"></i>
                        <h:outputText value="#{n.message}" style="font-size: 0.9rem; flex: 1;" />
                    </div>

                    <div style="text-align: right; margin-top: 8px;">
                        <p:commandButton icon="pi pi-check"
                                         title="Segna come letto"
                                         action="#{notificationView.markRead(n)}"
                                         update="@form"
                                         styleClass="rounded-button ui-button-flat ui-button-sm ui-button-success" />
                    </div>
                </div>
            </p:dataScroller>
        </p:overlayPanel>

    </h:form>
</ui:composition>
