spring:
  application:
    name: laundry-backend

  datasource:

    url: jdbc:mysql://localhost:3306/laundry_db?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # This will create tables automatically
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

application:
  security:
    jwt:
      # fixed hardcoded key
      secret-key: 655368566D597133743677397A24432646294A404E635266556A586E32723575
      expiration: 86400000 # 24 hours