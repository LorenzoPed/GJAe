<!DOCTYPE html>
<html
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
>
	<h:head>
		<title>Manager Dashboard</title>
		<style>
			body {
				font-family: "Segoe UI", sans-serif;
				background-color: #f4f4f9;
				padding: 20px;
			}
			.card {
				background: white;
				padding: 20px;
				border-radius: 8px;
				box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
			}
		</style>
	</h:head>

	<h:body>
		<div class="card">
			<ui:include src="/navbar.xhtml">
				<ui:param name="active" value="dashboard" />
			</ui:include>

			<h1 style="text-align: center; margin-top: 10px; color: #333;">
				<i class="pi pi-cog" style="font-size: 1em; vertical-align: middle; margin-right: 10px;"></i>
				Manager Dashboard
			</h1>

			<p:remoteCommand
				name="rcReloadAllBookings"
				action="#{bookingView.loadAllBookings}"
				update=":bookingsForm:dt-allbookings"
			/>

			<div style="padding: 10px">
				<h:form id="machinesForm">
					<div
						style="
							background: #f8f9fa;
							padding: 15px;
							border-radius: 8px;
							margin-bottom: 30px;
							border: 1px solid #ddd;
						"
					>
						<h2 style="margin-top: 0; color: #555">
							<i class="pi pi-server" style="margin-right: 8px;"></i>
							Laundry Machines
						</h2>

                        <p:commandButton value="New Machine"
                                         icon="pi pi-plus"
                                         actionListener="#{machineView.openCreate}"
                                         update=":createMachineForm:createMachineDialog"
                                         oncomplete="PF('createMachineDialog').show()"
                                         styleClass="ui-button-success" />

						<!-- Only GLOBAL messages (so input required/validation will not show here) -->
						<p:messages
							id="machineMessages"
							closable="true"
							showDetail="true"
							globalOnly="true"
							style="margin-top: 10px"
						/>

						<p:dataTable
							id="machinesTable"
							var="machine"
							value="#{machineView.machines}"
							stripedRows="true"
							style="margin-top: 10px"
						>
							<p:column headerText="ID" style="width: 60px">
								<h:outputText value="#{machine.id}" />
							</p:column>

							<p:column headerText="Name">
								<h:outputText
									value="#{machine.name}"
									style="font-weight: bold"
								/>
							</p:column>

							<p:column headerText="Type" style="width: 140px">
								<p:tag
									value="#{machine.type}"
									severity="#{machine.type == 'WASHER' ? 'info' : 'warning'}"
									icon="#{machine.type == 'WASHER' ? 'pi pi-replay' : 'pi pi-sun'}"
								/>
							</p:column>

							<p:column headerText="Status" style="width: 160px">
								<p:tag
									severity="#{machineView.getStatusSeverity(machine)}"
									value="#{machineView.getStatusLabel(machine)}"
									icon="#{machineView.getStatusIcon(machine)}"
								/>
							</p:column>

							<p:column
								headerText="Actions"
								style="width: 220px; text-align: center"
							>
								<p:commandButton
									icon="pi pi-pencil"
									styleClass="rounded-button ui-button-flat ui-button-warning"
									title="Edit Machine"
									process="@this"
									resetValues="true"
									actionListener="#{machineView.openEdit(machine)}"
									update=":editForm:editMachineDialog :editForm:editMessages"
									oncomplete="PF('editMachineDialog').show()"
								/>

								<p:commandButton
									icon="pi pi-wrench"
									styleClass="rounded-button ui-button-flat ui-button-secondary"
									title="Schedule Maintenance"
									disabled="#{not machine.enabled}"
									process="@this"
									resetValues="true"
									actionListener="#{machineView.openMaintenance(machine)}"
									update=":maintenanceForm:maintenanceDialog"
									oncomplete="PF('maintenanceDialog').show()"
								/>

								<p:commandButton
									icon="#{machine.enabled ? 'pi pi-ban' : 'pi pi-check'}"
									styleClass="rounded-button ui-button-flat #{machine.enabled ? 'ui-button-danger' : 'ui-button-success'}"
									title="#{machine.enabled ? 'Disable Machine' : 'Enable Machine'}"
									process="@this"
									action="#{machineView.toggleEnabled(machine)}"
									update=":machinesForm:machinesTable :machinesForm:machineMessages :bookingsForm:dt-allbookings"
									oncomplete="if (args &amp;&amp; args.success) { rcReloadAllBookings(); }"
								>
									<p:confirm
										header="Manager Action"
										message="#{machine.enabled ? 'Disable this machine?' : 'Enable this machine?'}"
										icon="pi pi-exclamation-triangle"
									/>
								</p:commandButton>

                                <p:commandButton
                                        icon="pi pi-trash"
                                        styleClass="rounded-button ui-button-flat ui-button-danger"
                                        title="Delete Machine"
                                        action="#{machineView.deleteMachine(machine)}"
                                        update=":machinesForm:machinesTable :machinesForm:machineMessages"
                                        process="@this"
                                >
                                <p:confirm
                                        header="Delete Machine"
                                        message="WARNING: This will delete the machine. Future bookings will be automatically rescheduled if possible; otherwise, they will be cancelled. All maintenance will be removed. Do you want to proceed?"
                                        icon="pi pi-exclamation-triangle"
                                />
                                </p:commandButton>

							</p:column>
						</p:dataTable>
					</div>
				</h:form>


                <h:form id="createMachineForm">
                    <p:dialog id="createMachineDialog" widgetVar="createMachineDialog"
                              header="Add New Machine" modal="true" responsive="true"
                              appendTo="@form" focusOnShow="true"
                              showEffect="fade" hideEffect="fade" closable="true" width="400">

                        <p:messages id="createMessages" showDetail="true" closable="true" style="margin-bottom:10px"/>

                        <h:panelGrid columns="2" cellpadding="5" style="width: 100%">

                            <h:outputLabel for="newName" value="Name:" style="font-weight:bold"/>
                            <p:inputText id="newName" value="#{machineView.newName}"
                                         required="true" requiredMessage="Name is required"
                                         style="width: 100%"/>

                            <h:outputLabel for="newType" value="Type:" style="font-weight:bold"/>
                            <p:selectOneMenu id="newType" value="#{machineView.newType}" style="width: 100%">
                                <f:selectItems value="#{machineView.machineTypes}" var="t"
                                               itemLabel="#{t}" itemValue="#{t}"/>
                            </p:selectOneMenu>

                        </h:panelGrid>

                        <f:facet name="footer">
                            <p:commandButton value="Save" icon="pi pi-check"
                                             action="#{machineView.createMachine}"
                                             update="createMessages :machinesForm:machinesTable :machinesForm:machineMessages"
                                             oncomplete="if (args &amp;&amp; args.success) { PF('createMachineDialog').hide(); rcReloadAllBookings(); }"
                                             styleClass="ui-button-primary"/>

                            <p:commandButton value="Cancel" icon="pi pi-times"
                                             onclick="PF('createMachineDialog').hide()"
                                             type="button"
                                             styleClass="ui-button-secondary ui-button-flat"/>
                        </f:facet>
                    </p:dialog>
                </h:form>

				<!-- EDIT DIALOG -->
				<h:form id="editForm">
					<p:dialog
						id="editMachineDialog"
						widgetVar="editMachineDialog"
						header="Edit Machine"
						modal="true"
						responsive="true"
						appendTo="@form"
						focusOnShow="false"
						showEffect="fade"
						hideEffect="fade"
						closable="true"
						width="420"
					>
						<!-- Messages inside the popup -->
						<p:messages
							id="editMessages"
							closable="true"
							showDetail="true"
							style="margin-bottom: 10px"
						/>

						<h:panelGrid columns="2" cellpadding="6" style="width: 100%">
							<h:outputLabel for="editName" value="Name" />
							<p:inputText
								id="editName"
								value="#{machineView.editName}"
								required="true"
								requiredMessage="Name is required."
								style="width: 100%"
							/>

							<h:outputLabel for="editType" value="Type" />
							<p:selectOneMenu
								id="editType"
								value="#{machineView.editType}"
								style="width: 100%"
								required="true"
								requiredMessage="Type is required."
							>
								<f:selectItems
									value="#{machineView.machineTypes}"
									var="t"
									itemLabel="#{t}"
									itemValue="#{t}"
								/>
							</p:selectOneMenu>
						</h:panelGrid>

						<f:facet name="footer">
							<p:commandButton
								value="Save"
								icon="pi pi-check"
								action="#{machineView.saveEdit}"
								process="@form"
								update=":editForm:editMessages :machinesForm:machinesTable :machinesForm:machineMessages"
								oncomplete="if (args &amp;&amp; args.success) { rcReloadAllBookings(); PF('editMachineDialog').hide(); }"
							/>
							<p:commandButton
								value="Cancel"
								type="button"
								icon="pi pi-times"
								styleClass="ui-button-secondary ui-button-flat"
								onclick="PF('editMachineDialog').hide();"
							/>
						</f:facet>
					</p:dialog>
				</h:form>

				<!-- MAINTENANCE DIALOG (own form + messages inside popup) -->
				<h:form id="maintenanceForm">
					<p:dialog
						id="maintenanceDialog"
						widgetVar="maintenanceDialog"
						header="Schedule Maintenance"
						modal="true"
						responsive="true"
						appendTo="@form"
						focusOnShow="false"
						showEffect="fade"
						hideEffect="fade"
						closable="true"
						width="560"
					>
						<p:messages
							id="maintenanceMessages"
							closable="true"
							showDetail="true"
							style="margin-bottom: 10px"
						/>

						<h:panelGroup layout="block" style="margin-bottom: 10px">
							<h:outputText
								value="Machine: #{machineView.maintenanceMachineName}"
								style="font-weight: 600"
							/>
						</h:panelGroup>

						<h:panelGrid columns="2" cellpadding="6" style="width: 100%">
							<h:outputLabel for="mStart" value="Start time" />
							<p:datePicker
								id="mStart"
								value="#{machineView.maintenanceStart}"
								pattern="dd/MM/yyyy HH:mm"
								showTime="true"
								showIcon="true"
								showOnFocus="false"
								appendTo="@(body)"
								required="true"
								requiredMessage="Start time is required."
								style="width: 100%"
							/>

							<h:outputLabel for="mEnd" value="End time" />
							<p:datePicker
								id="mEnd"
								value="#{machineView.maintenanceEnd}"
								pattern="dd/MM/yyyy HH:mm"
								showTime="true"
								showIcon="true"
								showOnFocus="false"
								appendTo="@(body)"
								required="true"
								requiredMessage="End time is required."
								style="width: 100%"
							/>

							<h:outputLabel for="mReason" value="Reason (optional)" />
							<p:inputTextarea
								id="mReason"
								value="#{machineView.maintenanceReason}"
								autoResize="false"
								rows="3"
								maxlength="500"
								style="width: 100%"
							/>
						</h:panelGrid>

						<h:panelGroup
							id="upcomingContainer"
							layout="block"
							style="margin-top: 16px"
						>
							<h:panelGroup
								rendered="#{not empty machineView.upcomingMaintenances}"
								layout="block"
							>
								<h3 style="margin: 0 0 8px 0">Upcoming maintenances</h3>
								<p:dataTable
									id="maintenanceTable"
									var="m"
									value="#{machineView.upcomingMaintenances}"
									stripedRows="true"
								>
									<p:column headerText="Start" style="width: 170px">
										<h:outputText value="#{m.startTime}">
											<f:convertDateTime
												type="localDateTime"
												pattern="dd/MM/yyyy HH:mm"
											/>
										</h:outputText>
									</p:column>

									<p:column headerText="End" style="width: 170px">
										<h:outputText value="#{m.endTime}">
											<f:convertDateTime
												type="localDateTime"
												pattern="dd/MM/yyyy HH:mm"
											/>
										</h:outputText>
									</p:column>

									<p:column headerText="Reason">
										<h:outputText value="#{empty m.reason ? '-' : m.reason}" />
									</p:column>

									<p:column
										headerText="Actions"
										style="width: 90px; text-align: center"
									>
										<p:commandButton
											icon="pi pi-times"
											styleClass="rounded-button ui-button-danger ui-button-flat"
											actionListener="#{machineView.cancelMaintenance(m.id)}"
											process="@this"
											update=":maintenanceForm:upcomingContainer :machinesForm:machinesTable :maintenanceForm:maintenanceMessages"
											oncomplete="if (args &amp;&amp; args.success) { rcReloadAllBookings(); }"
											title="Cancel Maintenance"
										>
											<p:confirm
												header="Manager Action"
												message="Cancel this maintenance?"
												icon="pi pi-exclamation-triangle"
											/>
										</p:commandButton>
									</p:column>
								</p:dataTable>
							</h:panelGroup>

							<h:panelGroup
								rendered="#{empty machineView.upcomingMaintenances}"
								layout="block"
							>
								<p:staticMessage
									severity="info"
									summary="Info"
									detail="No upcoming maintenances."
									style="width: 100%"
								/>
							</h:panelGroup>
						</h:panelGroup>

						<f:facet name="footer">
							<p:commandButton
								id="applyMaintenanceBtn"
								value="Apply"
								icon="pi pi-check"
								action="#{machineView.applyMaintenance}"
								process="@form"
								update=":maintenanceForm:maintenanceMessages :maintenanceForm:upcomingContainer :machinesForm:machinesTable :bookingsForm:dt-allbookings"
								oncomplete="if (args &amp;&amp; args.success) { rcReloadAllBookings(); PF('maintenanceDialog').hide(); }"
							/>
							<p:commandButton
								value="Close"
								type="button"
								icon="pi pi-times"
								styleClass="ui-button-secondary ui-button-flat"
								onclick="PF('maintenanceDialog').hide();"
							/>
						</f:facet>
					</p:dialog>
				</h:form>

				<!-- BOOKINGS -->
				<h:form id="bookingsForm">
					<div
						style="
							background: #fff;
							padding: 15px;
							border-radius: 8px;
							border: 2px solid #e0e0e0;
						"
					>
						<h2 style="margin-top: 0; color: #333">
							<i class="pi pi-list" style="margin-right: 8px;"></i>
							All System Bookings
						</h2>

						<p:dataTable
							id="dt-allbookings"
							var="booking"
							value="#{bookingView.allBookings}"
							stripedRows="true"
							paginator="true"
							rows="10"
							emptyMessage="No bookings found in the system."
							filterMatchesMode="contains"
						>
							<p:column
								headerText="ID"
								sortBy="#{booking.id}"
								style="width: 50px"
							>
								<h:outputText value="#{booking.id}" />
							</p:column>

							<p:column
								headerText="User"
								sortBy="#{booking.user.username}"
								filterBy="#{booking.user.username}"
								filterMatchMode="contains"
							>
								<h:outputText
									value="#{booking.user.username}"
									style="font-weight: bold; color: #2196f3"
								/>
							</p:column>

                            <p:column headerText="Machine" sortBy="#{booking.machine.name}"
                                      filterBy="#{booking.machine.name}" filterMatchMode="contains">

                                <h:outputText value="#{booking.machine.name}"
                                              rendered="#{booking.machine != null}" />

                                <h:outputText value="[DELETED MACHINE]"
                                              rendered="#{booking.machine == null}"
                                              style="color: #999; font-style: italic;" />

                            </p:column>

							<p:column headerText="Start Time" sortBy="#{booking.startTime}">
								<h:outputText
									value="#{booking.startTime}"
									style="color: #2e7d32; font-weight: 500"
								>
									<f:convertDateTime
										type="localDateTime"
										pattern="dd/MM/yyyy HH:mm"
									/>
								</h:outputText>
							</p:column>

							<p:column headerText="End Time" sortBy="#{booking.endTime}">
								<h:outputText
									value="#{booking.endTime}"
									style="color: #c62828; font-weight: 500"
								>
									<f:convertDateTime
										type="localDateTime"
										pattern="dd/MM/yyyy HH:mm"
									/>
								</h:outputText>
							</p:column>

							<p:column headerText="Status" style="width: 120px">
								<p:tag
									value="#{booking.status}"
									severity="#{booking.status == 'CANCELLED' ? 'danger' : (booking.status == 'PENDING' ? 'warning' : (booking.status == 'COMPLETED' ? 'info' : 'success'))}"
								/>
							</p:column>

                            <p:column headerText="Actions" style="width: 140px; text-align: center">

                                <p:commandButton
                                        icon="pi pi-times"
                                        styleClass="rounded-button ui-button-danger ui-button-flat"
                                        action="#{bookingView.cancelBooking(booking.id)}"
                                        update=":bookingsForm:dt-allbookings"
                                        title="Cancel Single Booking"
                                        disabled="#{booking.status == 'CANCELLED'}"
                                >
                                    <p:confirm
                                            header="Sigle confirmation"
                                            message="Do you want to delete this booking?"
                                            icon="pi pi-exclamation-triangle"
                                    />
                                </p:commandButton>

                                <p:commandButton
                                        icon="pi pi-user-minus"
                                        styleClass="rounded-button ui-button-secondary ui-button-flat"
                                        style="margin-left: 5px"
                                        action="#{bookingView.cancelAllBookingsForUser(booking.user)}"
                                        update=":bookingsForm:dt-allbookings"
                                        title="DELETE EVERYTHING for #{booking.user.username}"
                                        disabled="#{booking.status == 'CANCELLED'}"
                                >
                                    <p:confirm
                                            header="WARNING: Delete All Bookings"
                                            message="You are about to cancel ALL bookings (current and future) for user #{booking.user.username}. This action cannot be undone. Do you want to proceed?"
                                            icon="pi pi-exclamation-circle"
                                    />
                                </p:commandButton>

                            </p:column>
						</p:dataTable>
					</div>

					<p:confirmDialog
						global="true"
						showEffect="fade"
						hideEffect="fade"
						responsive="true"
						width="350"
					>
						<p:commandButton
							value="No"
							type="button"
							styleClass="ui-confirmdialog-no ui-button-flat"
						/>
						<p:commandButton
							value="Yes"
							type="button"
							styleClass="ui-confirmdialog-yes ui-button-danger"
						/>
					</p:confirmDialog>
				</h:form>
			</div>
		</div>
	</h:body>
</html>
