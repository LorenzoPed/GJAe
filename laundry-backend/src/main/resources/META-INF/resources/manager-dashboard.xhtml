<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Manager Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 20px;}
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ui-menubar { margin-bottom: 20px; }
    </style>
</h:head>

<h:body>
    <div class="card">
        <h:form>
            <p:menubar>
                <p:menuitem value="Dashboard" icon="pi pi-home" url="/manager-dashboard.xhtml"
                            disabled="true" style="font-weight: bold; opacity: 1 !important; color: #333 !important;"/>

                <p:menuitem value="Calendar" icon="pi pi-calendar" url="/home.xhtml"/>

                <p:menuitem value="My Bookings" icon="pi pi-list" url="/my-bookings.xhtml"/>

                <f:facet name="options">
                    <p:button value="Logout" href="/logout" icon="pi pi-power-off" styleClass="ui-button-danger ui-button-flat"/>
                </f:facet>
            </p:menubar>
        </h:form>

        <h1 style="text-align:center; margin-top: 10px;">🔧 Manager Dashboard</h1>

        <div style="padding: 10px;">

            <h:form id="machinesForm">
                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ddd;">
                    <h2 style="margin-top: 0; color: #555;">🧺 Laundry Machines</h2>

                    <p:dataTable var="machine"
                                 value="#{machineView.machines}"
                                 stripedRows="true"
                                 style="margin-top: 10px;">

                        <p:column headerText="ID" style="width: 50px;">
                            <h:outputText value="#{machine.id}"/>
                        </p:column>

                        <p:column headerText="Name">
                            <h:outputText value="#{machine.name}" style="font-weight: bold;"/>
                        </p:column>

                        <p:column headerText="Type" style="width: 120px;">
                            <p:tag value="#{machine.type}"
                                   severity="#{machine.type == 'WASHER' ? 'info' : 'warning'}"
                                   icon="#{machine.type == 'WASHER' ? 'pi pi-replay' : 'pi pi-sun'}"/>
                        </p:column>

                        <p:column headerText="Status" style="width: 120px;">
                            <p:tag severity="#{machine.enabled ? 'success' : 'danger'}"
                                   value="#{machine.enabled ? 'Active' : 'Disabled'}"
                                   icon="#{machine.enabled ? 'pi pi-check-circle' : 'pi pi-times-circle'}"/>
                        </p:column>

                        <p:column headerText="Actions" style="width: 120px; text-align: center;">
                            <p:commandButton icon="pi pi-pencil"
                                             styleClass="rounded-button ui-button-flat ui-button-warning"
                                             title="Edit Machine"/>
                        </p:column>
                    </p:dataTable>
                </div>
            </h:form>

            <h:form id="bookingsForm">
                <div style="background: #fff; padding: 15px; border-radius: 8px; border: 2px solid #e0e0e0;">
                    <h2 style="margin-top: 0; color: #333;">📅 All System Bookings</h2>

                    <p:dataTable id="dt-allbookings"
                                 var="booking"
                                 value="#{bookingView.allBookings}"
                                 stripedRows="true"
                                 paginator="true"
                                 rows="10"
                                 emptyMessage="No bookings found in the system."
                                 filteredValue="#{bookingView.filteredBookings}">

                        <p:column headerText="ID" sortBy="#{booking.id}" style="width: 50px;">
                            <h:outputText value="#{booking.id}"/>
                        </p:column>

                        <p:column headerText="User"
                                  sortBy="#{booking.user.username}"
                                  filterBy="#{booking.user.username}"
                                  filterMatchMode="contains">
                            <h:outputText value="#{booking.user.username}" style="font-weight: bold; color: #2196F3;"/>
                        </p:column>

                        <p:column headerText="Machine"
                                  sortBy="#{booking.machine.name}"
                                  filterBy="#{booking.machine.name}"
                                  filterMatchMode="contains">
                            <h:outputText value="#{booking.machine.name}"/>
                        </p:column>

                        <p:column headerText="Start Time" sortBy="#{booking.startTime}">
                            <h:outputText value="#{booking.startTime}" style="color: #2e7d32; font-weight: 500;">
                                <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm"/>
                            </h:outputText>
                        </p:column>

                        <p:column headerText="End Time" sortBy="#{booking.endTime}">
                            <h:outputText value="#{booking.endTime}" style="color: #c62828; font-weight: 500;">
                                <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm"/>
                            </h:outputText>
                        </p:column>

                        <p:column headerText="Status" style="width: 100px;">
                            <p:tag severity="success" value="CONFIRMED"/>
                        </p:column>

                        <p:column headerText="Actions" style="width: 80px; text-align: center;">
                            <p:commandButton icon="pi pi-trash"
                                             styleClass="rounded-button ui-button-danger ui-button-flat"
                                             action="#{bookingView.cancelBooking(booking.id)}"
                                             update="bookingsForm:dt-allbookings"
                                             title="Force Cancel">
                                <p:confirm header="Manager Override"
                                           message="Are you sure you want to delete this user's booking?"
                                           icon="pi pi-exclamation-triangle"/>
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
                </div>

                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                    <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
                    <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" />
                </p:confirmDialog>
            </h:form>

        </div>
    </div>
</h:body>
</html>
